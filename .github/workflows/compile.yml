name: Termux Treasure Builder
on:
  schedule:
    - cron: '0 * * * *' # 1時間ごとに実行
  workflow_dispatch:      # 手動実行用

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate Todo List
        run: |
          npm install axios
          node todo.js

      - name: Select Next Target
        id: select
        run: |
          # 成功・失敗リストを読み込んで、まだ試していないターゲットを1つ選ぶ
          TARGET=$(node -e "
            const todo = JSON.parse(require('fs').readFileSync('todo.json')).targets;
            const done = new Set([
              ...require('fs').readFileSync('success.txt', 'utf8').split('\n'),
              ...require('fs').readFileSync('fail.txt', 'utf8').split('\n')
            ]);
            const next = todo.find(p => p && !done.has(p));
            if (next) console.log(next);
            else process.exit(1);
          ")
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          echo "Building target: $TARGET"

      - name: Build with Termux Docker
        if: steps.select.outputs.target != ''
        run: |
          # Termux公式のビルド環境Dockerを使用
          # コンテナ内でビルドを実行し、成果物（.deb）を取り出す
          docker run --rm \
            -v $GITHUB_WORKSPACE:/home/builder/termux-packages \
            termux/package-builder \
            bash -c "
              ./build-package.sh ${{ steps.select.outputs.target }}
            " || touch BUILD_FAILED

      - name: Update Repository and Logs
        run: |
          TARGET="${{ steps.select.outputs.target }}"
          if [ -f BUILD_FAILED ]; then
            echo "$TARGET" >> fail.txt
          else
            echo "$TARGET" >> success.txt
            # ビルドされた.debを公開ディレクトリに移動
            mkdir -p docs/apt/termux-main
            mv *.deb docs/apt/termux-main/ 2>/dev/null || true
            
            # インデックスの更新（GitHub Pages用）
            cd docs/apt/termux-main
            dpkg-scanpackages . /dev/null | gzip -9c > Packages.gz
          fi

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@://github.com"
          git add docs/ success.txt fail.txt
          git commit -m "Build: ${{ steps.select.outputs.target }}" || exit 0
          git push
