name: Termux Treasure Builder (Full Source Mode)
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          touch success.txt fail.txt
          git clone --depth 1 https://github.com/termux/termux-packages builder-core
          mkdir -p apt/termux-main output

      - name: Update Target List
        run: |
          npm i axois
          node todo.js

      - name: Select Next 10 Targets
        id: select
        run: |
          TARGETS=$(node -e "
            const fs = require('fs');
            const read = (f) => fs.existsSync(f) ? fs.readFileSync(f, 'utf8') : '';
            const data = JSON.parse(fs.readFileSync('todo.json', 'utf8'));
            const done = new Set([
              ...read('success.txt').split('\n'),
              ...read('fail.txt').split('\n')
            ].map(s => s.trim()).filter(s => s));
            
            const next = data.targets.filter(t => !done.has(t)).slice(0, 10);
            if (next.length > 0) console.log(next.join(' '));
            else process.exit(1);
          ")
          echo "list=$TARGETS" >> $GITHUB_OUTPUT

      - name: Build Loop
        run: |
          for TARGET in ${{ steps.select.outputs.list }}; do
            echo "::group::Building $TARGET"
            rm -rf output/*
            touch BUILD_FAILED
            
            docker run --rm \
              -v $(pwd)/builder-core:/home/builder/termux-packages \
              -v $(pwd)/output:/home/builder/output \
              -e TGT=$TARGET \
              ghcr.io/termux/package-builder:latest \
              bash -c "
                set -ex
                # ソースリポジトリの追加（x86/Arm両方）
                echo 'deb-src http://archive.ubuntu.com/ubuntu noble main universe' | sudo tee -a /etc/apt/sources.list
                echo 'deb-src http://ports.ubuntu.com/ubuntu-ports noble main universe' | sudo tee -a /etc/apt/sources.list
                sudo apt-get update
                
                mkdir -p /tmp/work && cd /tmp/work
                apt-get source \$TGT || exit 1
                SRC_DIR=\$(find . -maxdepth 1 -type d | grep -v '^\.$' | head -n 1)
                
                PKG_DIR=/home/builder/termux-packages/packages/\$TGT
                mkdir -p \$PKG_DIR
                cat <<EOF > \$PKG_DIR/build.sh
          TERMUX_PKG_HOMEPAGE=https://ubuntu.com
          TERMUX_PKG_DESCRIPTION=\"Auto-built treasure\"
          TERMUX_PKG_VERSION=99.99
          TERMUX_PKG_SKIP_SRC_EXTRACT=true
          termux_step_extract_package() {
            mkdir -p \\\$TERMUX_PKG_SRCDIR
            cp -a /tmp/work/\${SRC_DIR#./}/* \\\$TERMUX_PKG_SRCDIR/
          }
          EOF
                cd /home/builder/termux-packages
                ./build-package.sh -a aarch64 \$TGT && rm -f /home/builder/output/../BUILD_FAILED || true
                cp ./output/*.deb /home/builder/output/ 2>/dev/null || true
              "

            if [ -f BUILD_FAILED ]; then
              echo "$TARGET" >> fail.txt
            else
              echo "$TARGET" >> success.txt
              cp output/*.deb apt/termux-main/ 2>/dev/null || echo "$TARGET" >> fail.txt
            fi
            echo "::endgroup::"
          done

      - name: Update APT Repo Index
        run: |
          cd apt/termux-main
          dpkg-scanpackages . /dev/null | gzip -9c > Packages.gz

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add success.txt fail.txt todo.json apt/
          git diff --staged --quiet || (git commit -m "Build 10 treasures: ${{ steps.select.outputs.list }}" && git push origin main)
