name: Termux Treasure Builder (Full Source Mode)
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Termux SDK
        run: |
          git clone --depth 1 https://github.com builder-core
          mkdir -p apt/termux-main output

      - name: Generate/Select Target
        id: select
        run: |
          # 前回のtodo.jsonを読み込み、次の1つを選択（パスをパッケージ名にクリーンアップ）
          TARGET=$(node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('todo.json', 'utf8'));
            const done = new Set([
              ...fs.readFileSync('success.txt', 'utf8').split('\n'),
              ...fs.readFileSync('fail.txt', 'utf8').split('\n')
            ].map(s => s.trim()));
            const next = data.targets.map(t => t.split('/').pop()).find(t => !done.has(t));
            if (next) console.log(next);
            else process.exit(1);
          ")
          echo "target=$TARGET" >> $GITHUB_OUTPUT

      - name: Build from Ubuntu Source
        run: |
          # 公式のpackage-builderコンテナで実行
          docker run --rm \
            -v $(pwd)/builder-core:/home/builder/termux-packages \
            -v $(pwd)/output:/home/builder/output \
            ghcr.io/termux/package-builder:latest \
            bash -c "
              set -e
              # 1. Ubuntuソースリポジトリの設定
              echo 'deb-src http://ubuntu.com noble main' >> /etc/apt/sources.list
              apt-get update
              
              # 2. ソースコードの取得
              mkdir -p /tmp/work && cd /tmp/work
              apt-get source ${{ steps.select.outputs.target }}
              SOURCE_DIR=\$(ls -d */ | head -n 1)
              
              # 3. Termuxの仮レシピ(build.sh)を動的生成
              # UbuntuのソースをTermuxのビルドフローに無理やり適合させる
              mkdir -p /home/builder/termux-packages/packages/${{ steps.select.outputs.target }}
              cat <<EOF > /home/builder/termux-packages/packages/${{ steps.select.outputs.target }}/build.sh
          TERMUX_PKG_HOMEPAGE=https://ubuntu.com{{ steps.select.outputs.target }}
          TERMUX_PKG_DESCRIPTION=\"Auto-built from Ubuntu source\"
          TERMUX_PKG_VERSION=99.99
          TERMUX_PKG_SKIP_SRC_EXTRACT=true
          termux_step_extract_package() {
            mkdir -p \$TERMUX_PKG_SRCDIR
            cp -a /tmp/work/\$SOURCE_DIR/* \$TERMUX_PKG_SRCDIR/
          }
          EOF

              # 4. ビルド実行 (aarch64向け)
              cd /home/builder/termux-packages
              ./build-package.sh -a aarch64 ${{ steps.select.outputs.target }}
              
              # 5. 成果物をホストへコピー
              cp ./output/*.deb /home/builder/output/ || true
            " || touch BUILD_FAILED

      - name: Update Repository and Logs
        run: |
          TARGET="${{ steps.select.outputs.target }}"
          if [ -f BUILD_FAILED ] || [ -z "$(ls -A output/*.deb 2>/dev/null)" ]; then
            echo "$TARGET" >> fail.txt
          else
            echo "$TARGET" >> success.txt
            cp output/*.deb apt/termux-main/
            cd apt/termux-main
            dpkg-scanpackages . /dev/null | gzip -9c > Packages.gz
          fi

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@://github.com"
          git add success.txt fail.txt apt/
          git commit -m "Build treasure: ${{ steps.select.outputs.target }}" || exit 0
          git push origin main
